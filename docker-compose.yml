version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: readmind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: readmind
      POSTGRES_PASSWORD: readmind_dev
      POSTGRES_DB: readmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readmind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
